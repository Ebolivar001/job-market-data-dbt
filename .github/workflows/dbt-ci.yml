name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  repository_dispatch:
    types: [ingestion-completed]

env:
  DBT_RAW_SCHEMA: stg
  DBT_RAW_JOB_POSTINGS_TABLE: raw_jobs

jobs:
  dbt:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: dbt
          POSTGRES_PASSWORD: dbt
          POSTGRES_DB: job_market
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Configure dbt profile
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml <<'EOF'
          job_market_data:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                user: dbt
                password: dbt
                port: 5432
                dbname: job_market
                schema: public
                threads: 4
          EOF

      - name: Load CI raw data fixture
        run: psql postgresql://dbt:dbt@localhost:5432/job_market -f ci/load_raw_jobs.sql

      - name: dbt deps
        run: dbt deps

      - name: dbt parse
        run: dbt parse

      - name: dbt run
        run: dbt run

      - name: dbt test
        run: dbt test
